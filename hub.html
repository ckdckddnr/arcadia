<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCADIA — Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --bg-void:#0A0D12; --surface:#12161F; --surface-2:#181D28; --line:#242B38;
    --amber:#FFB627; --cyan:#2DE1FC; --green:#34D399; --red:#FF5C5C; --pink:#FF5CB6;
    --text:#F4F6FA; --muted:#8A93A6;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html, body{ background:var(--bg-void); color:var(--text); font-family:'Inter','Noto Sans KR',sans-serif; min-height:100vh; overflow-x:hidden; }
  .mono{font-family:'IBM Plex Mono','Noto Sans KR',monospace;}
  .display{font-family:'Bebas Neue','Noto Sans KR',sans-serif;}

  #bg-canvas{ position:fixed; inset:0; width:100%; height:100%; z-index:0; display:block; }

  nav{
    position:sticky; top:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 5vw; background:rgba(10,13,18,0.9);
    backdrop-filter:blur(10px); border-bottom:1px solid var(--line);
  }
  .logo{ display:flex; align-items:center; gap:10px; font-family:'Bebas Neue','Noto Sans KR',sans-serif; font-size:26px; letter-spacing:0.03em; color:var(--text); text-decoration:none; }
  .logo .dot{width:10px; height:10px; border-radius:2px; background:var(--amber); box-shadow:0 0 12px var(--amber);}
  .back-link{color:var(--muted); text-decoration:none; font-size:15px; font-weight:600;}
  .back-link:hover{color:var(--text);}

  main{ position:relative; z-index:1; max-width:1000px; margin:0 auto; padding:40px 5vw 100px; }

  /* ---- Player card ---- */
  .player-card{
    background:rgba(18,22,31,0.85); border:1px solid var(--line); border-radius:16px;
    padding:24px 28px; margin-bottom:50px; backdrop-filter:blur(8px);
    display:flex; align-items:center; gap:22px; flex-wrap:wrap;
  }
  .player-avatar{
    width:64px; height:64px; border-radius:50%; flex-shrink:0;
    background:var(--surface-2); border:2px solid var(--cyan);
    display:flex; align-items:center; justify-content:center; font-size:30px;
    box-shadow:0 0 20px rgba(45,225,252,0.35);
  }
  .player-info{flex:1; min-width:220px;}
  .player-name-row{display:flex; align-items:center; gap:10px; margin-bottom:8px;}
  .player-name{font-size:19px; font-weight:800;}
  .level-badge{
    font-family:'IBM Plex Mono','Noto Sans KR',monospace; font-size:12px; font-weight:700;
    background:rgba(255,182,39,0.15); color:var(--amber); padding:3px 10px; border-radius:20px;
  }
  .xp-bar-track{ width:100%; height:10px; background:var(--surface-2); border-radius:6px; overflow:hidden; border:1px solid var(--line); }
  .xp-bar-fill{ height:100%; background:linear-gradient(90deg, var(--cyan), var(--green)); border-radius:6px; transition:width 0.6s ease; }
  .xp-label{font-size:12px; color:var(--muted); margin-top:6px; font-family:'IBM Plex Mono','Noto Sans KR',monospace;}
  .coin-display{
    display:flex; align-items:center; gap:8px;
    background:var(--surface-2); border:1px solid var(--line); border-radius:10px;
    padding:12px 18px; flex-shrink:0;
  }
  .coin-icon{font-size:22px;}
  .coin-value{font-family:'IBM Plex Mono','Noto Sans KR',monospace; font-size:20px; font-weight:700; color:var(--amber);}
  .coin-caption{font-size:11px; color:var(--muted);}

  .login-prompt{
    background:rgba(45,225,252,0.08); border:1px solid rgba(45,225,252,0.3); border-radius:12px;
    padding:16px 22px; margin-bottom:40px; font-size:14px; color:var(--text);
    display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;
  }
  .login-prompt a{color:var(--cyan); font-weight:700; text-decoration:none;}

  /* ---- Galaxy map ---- */
  .map-title{text-align:center; margin-bottom:8px;}
  .map-eyebrow{
    display:flex; align-items:center; justify-content:center; gap:8px;
    font-size:13px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--cyan);
    margin-bottom:10px;
  }
  .map-heading{font-family:'Bebas Neue','Noto Sans KR',sans-serif; font-size:40px; text-align:center; margin-bottom:50px;}

  .galaxy-map{
    position:relative; height:420px; margin:0 auto; max-width:820px;
  }
  .map-connector{
    position:absolute; border-top:2px dashed rgba(138,147,166,0.3);
    transform-origin:0 0; z-index:0;
  }
  .planet-node{
    position:absolute; width:150px; text-align:center; z-index:2;
    transform:translate(-50%,-50%); cursor:pointer;
    transition:transform 0.2s;
  }
  .planet-node:hover{ transform:translate(-50%,-50%) scale(1.06); }
  .planet-orb{
    width:110px; height:110px; border-radius:50%; margin:0 auto 10px;
    display:flex; align-items:center; justify-content:center; font-size:42px;
    border:2px solid var(--line); position:relative;
  }
  .planet-orb::after{
    content:""; position:absolute; inset:-10px; border-radius:50%;
    border:1px dashed rgba(255,255,255,0.08);
  }
  .planet-name{font-weight:800; font-size:15px; margin-bottom:2px;}
  .planet-tag{font-size:11px; color:var(--muted);}
  .planet-live{color:var(--green); font-weight:700;}

  .center-hub{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); z-index:2;
    width:96px; height:96px; border-radius:50%;
    background:radial-gradient(circle, rgba(255,182,39,0.25), rgba(255,182,39,0.02));
    border:2px solid rgba(255,182,39,0.5);
    display:flex; align-items:center; justify-content:center; font-size:34px;
  }

  @media (max-width:720px){
    .galaxy-map{ height:auto; }
    .planet-node{ position:static; transform:none; display:inline-block; width:calc(50% - 10px); margin-bottom:24px; }
    .planet-node:hover{ transform:scale(1.04); }
    .center-hub{ display:none; }
    .map-connector{ display:none; }
    .galaxy-map{ display:flex; flex-wrap:wrap; justify-content:center; gap:10px; }
  }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<nav>
  <a href="index.html" class="logo"><div class="dot"></div>ARCADIA</a>
  <a href="index.html" class="back-link">&larr; Back to home</a>
</nav>

<main>
  <div class="login-prompt" id="login-prompt" style="display:none;">
    <span><a href="auth.html">Log in</a> to track your level, XP, and coins across every game.</span>
  </div>

  <div class="player-card" id="player-card" style="display:none;">
    <div class="player-avatar">🚀</div>
    <div class="player-info">
      <div class="player-name-row">
        <span class="player-name" id="player-name">Pilot</span>
        <span class="level-badge" id="level-badge">LV 1</span>
      </div>
      <div class="xp-bar-track"><div class="xp-bar-fill" id="xp-bar-fill" style="width:0%;"></div></div>
      <div class="xp-label" id="xp-label">0 / 50 XP to next level</div>
    </div>
    <div class="coin-display">
      <span class="coin-icon">🪙</span>
      <div>
        <div class="coin-value" id="coin-value">0</div>
        <div class="coin-caption">Coins earned</div>
      </div>
    </div>
  </div>

  <div class="map-title">
    <div class="map-eyebrow"><span>●</span> Galaxy Map</div>
    <div class="map-heading">Choose Your Next Run</div>
  </div>

  <div class="galaxy-map" id="galaxy-map">
    <div class="center-hub">🛰️</div>

    <div class="map-connector" id="conn-1"></div>
    <div class="map-connector" id="conn-2"></div>
    <div class="map-connector" id="conn-3"></div>

    <a href="game-asteroid-run.html" class="planet-node" id="node-1" style="text-decoration:none; color:inherit;">
      <div class="planet-orb" style="background:radial-gradient(circle at 35% 30%, rgba(45,225,252,0.5), rgba(20,40,55,0.9));">☄️</div>
      <div class="planet-name">Asteroid Run</div>
      <div class="planet-tag planet-live">● Free to play</div>
    </a>

    <a href="game-orbit-snap.html" class="planet-node" id="node-2" style="text-decoration:none; color:inherit;">
      <div class="planet-orb" style="background:radial-gradient(circle at 35% 30%, rgba(255,92,182,0.5), rgba(50,20,45,0.9));">🪐</div>
      <div class="planet-name">Orbit Snap</div>
      <div class="planet-tag planet-live">● Free to play</div>
    </a>

    <a href="game-tank-clash.html" class="planet-node" id="node-3" style="text-decoration:none; color:inherit;">
      <div class="planet-orb" style="background:radial-gradient(circle at 35% 30%, rgba(52,211,153,0.5), rgba(15,45,30,0.9));">⚔️</div>
      <div class="planet-name">Tank Clash</div>
      <div class="planet-tag planet-live">● Free to play</div>
    </a>
  </div>
</main>

<script>
  const SUPABASE_URL = 'https://ndntseichzbdzehksxxk.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_3w88cicQLrH0bSJfSNpi1Q_6kyY0Qsy';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function xpForLevel(level){ return 25 * level * (level - 1); }
  function levelFromXp(xp){
    let l = 1;
    while(xpForLevel(l + 1) <= xp) l++;
    return l;
  }

  async function loadPlayerCard(){
    const { data: sessionData } = await sb.auth.getSession();
    if(!sessionData.session){
      document.getElementById('login-prompt').style.display = 'flex';
      return;
    }
    const user = sessionData.session.user;
    const username = (user.user_metadata && user.user_metadata.username) || user.email.split('@')[0];

    const { data: profile } = await sb.from('profiles').select('xp,coins').eq('user_id', user.id).maybeSingle();
    const xp = profile ? profile.xp : 0;
    const coins = profile ? profile.coins : 0;
    const level = levelFromXp(xp);
    const curFloor = xpForLevel(level);
    const nextFloor = xpForLevel(level + 1);
    const progress = Math.min(100, Math.round(((xp - curFloor) / (nextFloor - curFloor)) * 100));

    document.getElementById('player-name').textContent = username;
    document.getElementById('level-badge').textContent = 'LV ' + level;
    document.getElementById('xp-bar-fill').style.width = progress + '%';
    document.getElementById('xp-label').textContent = (xp - curFloor) + ' / ' + (nextFloor - curFloor) + ' XP to next level';
    document.getElementById('coin-value').textContent = coins.toLocaleString();
    document.getElementById('player-card').style.display = 'flex';
  }

  function layoutMap(){
    const mapEl = document.getElementById('galaxy-map');
    if(window.innerWidth <= 720) return; // static stacked layout on mobile, skip positioning
    const w = mapEl.clientWidth, h = mapEl.clientHeight;
    const cx = w / 2, cy = h / 2;
    const radius = Math.min(w, h) / 2 - 60;
    const angles = [ -90, 30, 150 ]; // three planets, evenly spaced around the hub
    const nodes = ['node-1', 'node-2', 'node-3'];
    const conns = ['conn-1', 'conn-2', 'conn-3'];

    nodes.forEach((id, i) => {
      const rad = angles[i] * Math.PI / 180;
      const x = cx + Math.cos(rad) * radius;
      const y = cy + Math.sin(rad) * radius;
      const el = document.getElementById(id);
      el.style.left = x + 'px';
      el.style.top = y + 'px';

      const conn = document.getElementById(conns[i]);
      const dx = x - cx, dy = y - cy;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const angle = Math.atan2(dy, dx) * 180 / Math.PI;
      conn.style.width = dist + 'px';
      conn.style.left = cx + 'px';
      conn.style.top = cy + 'px';
      conn.style.transform = 'rotate(' + angle + 'deg)';
    });
  }

  window.addEventListener('resize', layoutMap);
  layoutMap();
  loadPlayerCard();
</script>

<script>
(function(){
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  let w, h, stars, t = 0;
  const STAR_COUNT = 100;

  function resize(){ w = canvas.width = window.innerWidth; h = canvas.height = document.documentElement.scrollHeight; }
  function makeStars(){
    stars = Array.from({length: STAR_COUNT}, () => ({
      x: Math.random() * w, y: Math.random() * h,
      r: Math.random() * 1.2 + 0.3, phase: Math.random() * Math.PI * 2, speed: 0.4 + Math.random() * 0.6
    }));
  }
  function step(){
    ctx.clearRect(0, 0, w, h);
    for(const s of stars){
      const tw = 0.3 + 0.3 * Math.sin(t * s.speed + s.phase);
      ctx.globalAlpha = Math.max(0, tw);
      ctx.fillStyle = '#F4F6FA';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    t += 0.016;
    if(!reduceMotion) requestAnimationFrame(step);
  }
  resize(); makeStars();
  window.addEventListener('resize', () => { resize(); makeStars(); });
  if(reduceMotion){ step(); } else { requestAnimationFrame(step); }
})();
</script>
</body>
</html>
