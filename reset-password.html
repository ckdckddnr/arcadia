<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCADIA — Reset Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --bg-void:#0A0D12; --surface:#12161F; --surface-2:#181D28; --line:#242B38;
    --amber:#FFB627; --cyan:#2DE1FC; --green:#34D399; --red:#FF5C5C;
    --text:#F4F6FA; --muted:#8A93A6;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg-void); color:var(--text);
    font-family:'Inter','Noto Sans KR',sans-serif;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:24px;
  }
  .logo{
    display:flex; align-items:center; gap:10px; justify-content:center;
    font-family:'Bebas Neue','Noto Sans KR',sans-serif; font-size:26px; letter-spacing:0.03em;
    color:var(--text); text-decoration:none; margin-bottom:28px;
  }
  .logo .dot{width:10px; height:10px; border-radius:2px; background:var(--amber); box-shadow:0 0 12px var(--amber);}

  .panel{
    background:var(--surface); border:1px solid var(--line); border-radius:16px;
    padding:40px; max-width:420px; width:100%;
    box-shadow:0 40px 100px -20px rgba(0,0,0,0.65);
  }
  .panel h1{font-family:'Bebas Neue','Noto Sans KR',sans-serif; font-size:32px; margin-bottom:8px; text-align:center;}
  .panel p{color:var(--muted); font-size:14px; text-align:center; margin-bottom:24px; line-height:1.6;}

  .field{margin-bottom:18px;}
  .field label{display:block; font-size:13px; font-weight:600; color:var(--muted); margin-bottom:8px;}
  .field input{
    width:100%; padding:13px 14px; background:var(--surface-2); border:1px solid var(--line);
    border-radius:8px; color:var(--text); font-family:'Inter','Noto Sans KR',sans-serif; font-size:15px;
  }
  .field input:focus{outline:none; border-color:var(--cyan);}

  .btn{
    font-family:'Inter','Noto Sans KR',sans-serif; font-weight:700; font-size:16px;
    padding:14px 22px; border-radius:8px; border:none; cursor:pointer; width:100%;
  }
  .btn-primary{background:var(--amber); color:#1A1200;}
  .btn[disabled]{opacity:0.6; cursor:not-allowed;}

  .form-msg{display:none; font-size:13px; font-weight:600; padding:11px 14px; border-radius:8px; margin-bottom:18px; line-height:1.5;}
  .form-msg.show{display:block;}
  .form-msg.error{background:rgba(255,92,92,0.12); color:#FF8A8A; border:1px solid rgba(255,92,92,0.3);}
  .form-msg.success{background:rgba(52,211,153,0.12); color:var(--green); border:1px solid rgba(52,211,153,0.3);}

  .back-link{display:block; text-align:center; margin-top:20px; color:var(--muted); font-size:14px; text-decoration:none;}
  .back-link:hover{color:var(--text);}
</style>
</head>
<body>

<div style="width:100%; max-width:420px;">
  <a href="index.html" class="logo"><div class="dot"></div>ARCADIA</a>

  <div class="panel">
    <div id="invalid-state" style="display:none;">
      <h1>Link expired</h1>
      <p>This password reset link is invalid or has expired. Request a new one from the log in page.</p>
      <a href="auth.html" class="btn btn-primary" style="display:block; text-align:center; text-decoration:none; box-sizing:border-box;">Back to Log In</a>
    </div>

    <div id="reset-state" style="display:none;">
      <h1>Set a new password</h1>
      <p>Choose a new password for your account.</p>
      <div class="form-msg" id="reset-msg"></div>

      <div class="field">
        <label for="new-password">New Password</label>
        <input type="password" id="new-password" placeholder="Enter a new password">
      </div>
      <div class="field">
        <label for="confirm-password">Confirm New Password</label>
        <input type="password" id="confirm-password" placeholder="Re-enter the new password">
      </div>
      <button class="btn btn-primary" id="reset-btn" onclick="handleReset()">Update Password</button>
    </div>

    <div id="loading-state">
      <p>Checking your reset link...</p>
    </div>
  </div>

  <a href="index.html" class="back-link">&larr; Back to home</a>
</div>

<script>
  const SUPABASE_URL = 'https://ndntseichzbdzehksxxk.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_3w88cicQLrH0bSJfSNpi1Q_6kyY0Qsy';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function showMsg(id, text, type){
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'form-msg show ' + type;
  }
  function hideMsg(id){
    document.getElementById(id).className = 'form-msg';
  }

  async function handleReset(){
    const pw = document.getElementById('new-password').value;
    const confirm = document.getElementById('confirm-password').value;
    const btn = document.getElementById('reset-btn');
    hideMsg('reset-msg');

    if(!pw || pw.length < 6){
      showMsg('reset-msg', 'Password must be at least 6 characters.', 'error');
      return;
    }
    if(pw !== confirm){
      showMsg('reset-msg', 'Passwords don\'t match.', 'error');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Updating...';

    const { error } = await sb.auth.updateUser({ password: pw });

    btn.disabled = false;
    btn.textContent = 'Update Password';

    if(error){
      showMsg('reset-msg', error.message, 'error');
    } else {
      showMsg('reset-msg', 'Password updated! Redirecting to log in...', 'success');
      await sb.auth.signOut();
      setTimeout(() => { window.location.href = 'auth.html'; }, 1500);
    }
  }

  // Supabase automatically parses the recovery token from the URL and
  // creates a temporary session when this page loads via the email link.
  (async () => {
    const { data } = await sb.auth.getSession();
    document.getElementById('loading-state').style.display = 'none';
    if(data.session){
      document.getElementById('reset-state').style.display = 'block';
    } else {
      document.getElementById('invalid-state').style.display = 'block';
    }
  })();
</script>
</body>
</html>
